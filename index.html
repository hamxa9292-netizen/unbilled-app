<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F4E79">
<title>Unbilled Readings</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:#1F4E79;color:#fff;padding:13px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;}
.hdr h1{font-size:16px;font-weight:600;flex:1;}
.hdr-name{font-size:12px;opacity:.8;cursor:pointer;}
.hdr-rf{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:5px 10px;font-size:14px;cursor:pointer;margin-left:4px;}
.sbar{font-size:12px;padding:6px 16px;align-items:center;gap:6px;display:none;}
.sbar.show{display:flex;}
.sbar.offline{background:#92400e;color:#fef3c7;}
.sbar.syncing{background:#1e40af;color:#dbeafe;}
.sbar.ok{background:#14532d;color:#dcfce7;}
.content{flex:1;padding-bottom:72px;}
.screen{display:none;}
.screen.active{display:block;}

/* Area selector screen */
.area-screen{padding:20px 16px;}
.area-title{font-size:18px;font-weight:700;color:#1F4E79;margin-bottom:6px;}
.area-sub{font-size:14px;color:#6b7280;margin-bottom:20px;}
.area-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.area-btn{background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;font-family:inherit;transition:all .15s;}
.area-btn:active{opacity:.8;}
.area-btn.selected{border-color:#1F4E79;background:#EBF3FB;}
.area-btn .anum{font-size:24px;font-weight:800;color:#1F4E79;}
.area-btn .albl{font-size:12px;color:#6b7280;margin-top:2px;}
.area-btn.all-btn{grid-column:1/-1;background:#1F4E79;border-color:#1F4E79;}
.area-btn.all-btn .anum{color:#fff;font-size:18px;}
.area-btn.all-btn .albl{color:rgba(255,255,255,.8);}
.area-load{background:#1E7145;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;width:100%;margin-top:16px;cursor:pointer;font-family:inherit;display:none;}

/* Search + list */
.topbar{background:#1F4E79;padding:0 12px 12px;position:sticky;top:46px;z-index:99;}
.area-chip{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-top:10px;}
.achip{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
.achange{background:none;border:none;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;}
.sw{position:relative;}
.sw input{width:100%;padding:11px 70px 11px 42px;font-size:15px;border:none;border-radius:10px;background:#fff;font-family:inherit;outline:none;color:#111;}
.sw .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;color:#9ca3af;}
.sw .go{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#1F4E79;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;}
.lhdr{padding:10px 16px 6px;display:flex;justify-content:space-between;}
.lhdr-t{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;}
.lhdr-c{font-size:12px;color:#9ca3af;}
.acard{background:#fff;margin:0 12px 8px;border-radius:12px;padding:13px 14px;box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:pointer;border-left:4px solid #f59e0b;display:flex;align-items:center;gap:10px;}
.acard:active{opacity:.85;}
.acard.updated{background:#f0fdf4;border-left-color:#16a34a;}
.ainfo{flex:1;min-width:0;}
.aacno{font-size:15px;font-weight:700;color:#1F4E79;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.utag{font-size:10px;font-weight:700;color:#16a34a;background:#dcfce7;padding:2px 7px;border-radius:10px;}
.ameter{font-size:12px;color:#374151;font-weight:500;margin-top:2px;}
.aaddr{font-size:12px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.ardate{font-size:11px;color:#9ca3af;margin-top:2px;}
.arr{font-size:18px;color:#d1d5db;flex-shrink:0;}
.dpad{padding:12px 14px;}
.backbtn{display:flex;align-items:center;gap:6px;font-size:14px;color:#1F4E79;font-weight:600;background:none;border:none;cursor:pointer;padding:8px 0 12px;font-family:inherit;}
.card{background:#fff;border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ctitle{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-bottom:11px;}
.irow{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f3f4f6;}
.irow:last-child{border-bottom:none;}
.ilbl{font-size:13px;color:#6b7280;}
.ival{font-size:13px;font-weight:500;color:#111;text-align:right;max-width:65%;}
.badge{display:inline-flex;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.bp{background:#fef3c7;color:#92400e;}
.bd{background:#d1fae5;color:#065f46;}
.abig{font-size:26px;font-weight:800;color:#1F4E79;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px;}
.field input,.field textarea{width:100%;padding:10px 13px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:15px;background:#fff;color:#111;font-family:inherit;outline:none;}
.field input:focus,.field textarea:focus{border-color:#1F4E79;}
.field textarea{resize:none;height:76px;}
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-bottom:8px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{opacity:.82;}
.btnp{background:#1F4E79;color:#fff;}
.btns{background:#1E7145;color:#fff;}
.btng{background:#f3f4f6;color:#374151;}
.errmsg{background:#fee2e2;color:#b91c1c;padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:10px;display:none;}
.photobtn{width:100%;padding:12px;border:2px dashed #d1d5db;border-radius:10px;background:#f9fafb;color:#6b7280;font-size:14px;cursor:pointer;font-family:inherit;}
.photo-preview img{width:100%;border-radius:10px;max-height:200px;object-fit:cover;}
.rmphoto{margin-top:6px;background:#fee2e2;color:#b91c1c;border:none;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;font-family:inherit;}
.swrap{text-align:center;padding:48px 20px;}
.sico{font-size:60px;margin-bottom:14px;}
.stitle{font-size:20px;font-weight:700;color:#111;margin-bottom:6px;}
.ssub{font-size:14px;color:#6b7280;margin-bottom:26px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 10px;}
.stat{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.statn{font-size:24px;font-weight:800;color:#1F4E79;}
.statl{font-size:11px;color:#6b7280;margin-top:2px;}
.nav{display:flex;background:#fff;border-top:1px solid #e5e7eb;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;}
.nbtn{flex:1;padding:9px 4px 11px;text-align:center;font-size:11px;font-weight:500;color:#9ca3af;cursor:pointer;border:none;background:none;font-family:inherit;position:relative;}
.nbtn.active{color:#1F4E79;}
.nico{font-size:21px;display:block;margin-bottom:1px;}
.ndot{width:8px;height:8px;background:#ef4444;border-radius:50%;display:none;position:absolute;top:7px;right:calc(50% - 18px);}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg);}}
.loading{text-align:center;padding:40px 20px;color:#9ca3af;font-size:14px;line-height:1.8;}
.loadmore{margin:4px 12px 14px;padding:11px;background:#fff;border:1.5px dashed #d1d5db;border-radius:10px;color:#6b7280;font-size:14px;text-align:center;cursor:pointer;font-family:inherit;width:calc(100% - 24px);}
.empty{text-align:center;padding:48px 20px;color:#9ca3af;}
.plist{padding:0 12px;}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <span style="font-size:21px">⚡</span>
  <h1>Unbilled Readings</h1>
  <span class="hdr-name" onclick="changeName()">👤 <span id="wlabel">Field Worker</span></span>
  <button class="hdr-rf" id="rfbtn" onclick="hardRefresh()">🔄</button>
</div>
<div class="sbar" id="sbar"></div>

<div class="content">

  <!-- AREA SELECTION SCREEN -->
  <div class="screen active" id="screen-area">
    <div class="area-screen">
      <div class="area-title">Select Area</div>
      <div class="area-sub">Choose an area to load its accounts</div>
      <div class="area-grid" id="area-grid">
        <div class="loading">⏳ Loading areas...</div>
      </div>
      <button class="area-load" id="area-load-btn" onclick="loadSelectedArea()">
        Load Accounts →
      </button>
    </div>
  </div>

  <!-- HOME (account list) -->
  <div class="screen" id="screen-home">
    <div class="topbar">
      <div class="area-chip">
        <span class="achip" id="area-chip">Area: All</span>
        <button class="achange" onclick="showAreaScreen()">Change area</button>
      </div>
      <div class="sw">
        <span class="ico">🔍</span>
        <input type="number" id="sinput" placeholder="Search account / meter no..." inputmode="numeric" autocomplete="off"
          oninput="filterList(this.value)" onkeydown="if(event.key==='Enter')quickSearch()">
        <button class="go" onclick="quickSearch()">Go</button>
      </div>
    </div>
    <div class="lhdr">
      <span class="lhdr-t" id="ltitle">Unbilled Accounts</span>
      <span class="lhdr-c" id="lcount"></span>
    </div>
    <div id="alist"></div>
    <button class="loadmore" id="lmbtn" onclick="loadMore()" style="display:none">Load more ↓</button>
  </div>

  <!-- DETAIL -->
  <div class="screen" id="screen-detail">
    <div class="dpad">
      <button class="backbtn" onclick="goBack()">← Back to list</button>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px">
          <div>
            <div style="font-size:11px;color:#9ca3af;margin-bottom:2px">Account No.</div>
            <div class="abig" id="d-acno"></div>
          </div>
          <span class="badge" id="d-status"></span>
        </div>
        <div class="irow"><span class="ilbl">Area</span><span class="ival" id="d-area"></span></div>
        <div class="irow"><span class="ilbl">Meter No.</span><span class="ival" id="d-meter"></span></div>
        <div class="irow"><span class="ilbl">Premises</span><span class="ival" id="d-addr"></span></div>
        <div class="irow"><span class="ilbl">Prev. Reading</span><span class="ival" id="d-prev"></span></div>
        <div class="irow"><span class="ilbl">Prev. Date</span><span class="ival" id="d-pdate"></span></div>
        <div class="irow"><span class="ilbl">R_DATE</span><span class="ival" id="d-rdate"></span></div>
      </div>
      <div class="card">
        <div class="ctitle">Update Reading</div>
        <div class="field"><label>New Reading</label>
          <input type="number" id="f-reading" placeholder="Enter meter reading" inputmode="numeric">
        </div>
        <div class="field"><label>New Date</label>
          <input type="date" id="f-date">
        </div>
        <div class="field"><label>Remarks</label>
          <textarea id="f-remarks" placeholder="e.g. Done, Locked, No access..."></textarea>
        </div>
        <div class="field">
          <label>Meter Photo (optional)</label>
          <div id="pp" style="display:none;margin-bottom:8px;">
            <div class="photo-preview"><img id="pimg" src=""></div>
            <button class="rmphoto" onclick="clearPhoto()">✕ Remove photo</button>
          </div>
          <div id="pbw">
            <button class="photobtn" onclick="document.getElementById('pinput').click()">📷 Take or choose photo</button>
            <input type="file" id="pinput" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)">
          </div>
        </div>
        <div class="errmsg" id="serr"></div>
        <button class="btn btns" onclick="saveReading()" id="savebtn">💾 Save Reading</button>
        <button class="btn btng" onclick="goBack()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div class="screen" id="screen-success">
    <div class="swrap">
      <div class="sico">✅</div>
      <div class="stitle">Reading saved!</div>
      <div class="ssub" id="smsg"></div>
      <button class="btn btnp" onclick="goBack()" style="margin-bottom:10px">← Back to list</button>
      <button class="btn btng" onclick="switchNav('pending')">View pending</button>
    </div>
  </div>

  <!-- PENDING -->
  <div class="screen" id="screen-pending">
    <div class="stats">
      <div class="stat"><div class="statn" id="sp">0</div><div class="statl">Pending sync</div></div>
      <div class="stat"><div class="statn" id="ss">0</div><div class="statl">Synced</div></div>
    </div>
    <div style="padding:0 14px 12px"><button class="btn btnp" onclick="syncAll()" id="syncbtn">🔄 Sync all now</button></div>
    <div class="lhdr"><span class="lhdr-t">Saved updates</span></div>
    <div class="plist" id="plist"></div>
    <div class="empty" id="pempty" style="display:none"><div style="font-size:44px;margin-bottom:10px">✅</div><div>All synced!</div></div>
  </div>

</div>

<nav class="nav">
  <button class="nbtn active" id="nav-home" onclick="switchNav('home')">
    <span class="nico">🏠</span>Home
  </button>
  <button class="nbtn" id="nav-pending" onclick="switchNav('pending')">
    <span class="nico">🕐</span>Pending
    <span class="ndot" id="ndot"></span>
  </button>
</nav>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxRqL8C6-0B8Ft3wt6LJY636Z74EWeSAby0k5tExIMyaLD3HcdkJFB_oJ6C8-KUmEM-/exec";
const CK = 'ub_cache', CT = 'ub_ts', TTL = 30*60*1000;
let pending = JSON.parse(localStorage.getItem('ub_pending') || '[]');
let allAccounts = [], filtered = [], page = 1, pageSize = 40;
let currentAcct = null, photoB64 = null;
let selectedArea = localStorage.getItem('ub_area') || 'all';
let updatedSet = new Set(pending.map(p => String(p.acno)));

function showBar(msg, type) {
  const b = document.getElementById('sbar');
  b.className = 'sbar show ' + type;
  b.textContent = msg;
  if (type==='ok') setTimeout(()=>b.className='sbar',3000);
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function switchNav(tab) {
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nav-'+tab);
  if (nb) nb.classList.add('active');
  if (tab==='pending') { renderPending(); show('pending'); }
  else if (tab==='home') show('home');
}

function goBack() { clearPhoto(); show('home'); switchNav('home'); }

function showAreaScreen() { show('area'); }

// ── Area selection ──
let selectedAreaTemp = selectedArea;

async function loadAreas() {
  const grid = document.getElementById('area-grid');
  try {
    const res = await fetch(API + '?action=areas');
    const data = await res.json();
    const areas = data.areas || [];
    grid.innerHTML = `
      <div class="area-btn all-btn ${selectedAreaTemp==='all'?'selected':''}" onclick="selectArea('all',this)">
        <div class="anum">ALL</div>
        <div class="albl">All Areas</div>
      </div>` +
      areas.map(a => `
        <div class="area-btn ${selectedAreaTemp===String(a)?'selected':''}" onclick="selectArea('${a}',this)">
          <div class="anum">${a}</div>
          <div class="albl">Area ${a}</div>
        </div>`).join('');
    document.getElementById('area-load-btn').style.display = 'block';
  } catch(e) {
    grid.innerHTML = '<div style="color:#b91c1c;padding:16px;text-align:center">Could not load areas. Check connection.</div>';
  }
}

function selectArea(area, el) {
  document.querySelectorAll('.area-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  selectedAreaTemp = area;
}

async function loadSelectedArea() {
  selectedArea = selectedAreaTemp;
  localStorage.setItem('ub_area', selectedArea);
  const btn = document.getElementById('area-load-btn');
  btn.innerHTML = '<span class="spin"></span> Loading...';
  btn.disabled = true;
  localStorage.removeItem(CK); localStorage.removeItem(CT);
  await loadAll(true);
  btn.innerHTML = 'Load Accounts →';
  btn.disabled = false;
  document.getElementById('area-chip').textContent = selectedArea==='all' ? 'Area: All' : 'Area: '+selectedArea;
  show('home');
  switchNav('home');
}

async function hardRefresh() {
  const btn = document.getElementById('rfbtn');
  btn.textContent = '⏳'; btn.disabled = true;
  localStorage.removeItem(CK); localStorage.removeItem(CT);
  await loadAll(true);
  btn.textContent = '🔄'; btn.disabled = false;
  showBar('Refreshed ✓','ok');
}

async function loadAll(force) {
  const el = document.getElementById('alist');
  if (!force) {
    const c = localStorage.getItem(CK), ts = parseInt(localStorage.getItem(CT)||'0');
    if (c && (Date.now()-ts)<TTL) {
      allAccounts = JSON.parse(c);
      filtered = allAccounts.filter(a=>a.status==='pending');
      renderList();
      document.getElementById('lcount').textContent = filtered.length+' pending';
      bgRefresh();
      return;
    }
  }
  el.innerHTML = '<div class="loading">⏳ Loading accounts...<br><small>May take 15–20 seconds on first load</small></div>';
  const areaParam = selectedArea!=='all' ? '&area='+encodeURIComponent(selectedArea) : '';
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(()=>ctrl.abort(), 45000);
    const res = await fetch(API+'?action=all'+areaParam, {signal:ctrl.signal});
    clearTimeout(tid);
    const data = await res.json();
    allAccounts = data.accounts || [];
    localStorage.setItem(CK, JSON.stringify(allAccounts));
    localStorage.setItem(CT, Date.now()+'');
    filtered = allAccounts.filter(a=>a.status==='pending');
    renderList();
    document.getElementById('lcount').textContent = filtered.length+' pending';
    document.getElementById('ltitle').textContent = 'Unbilled Accounts';
  } catch(e) {
    const c = localStorage.getItem(CK);
    if (c) {
      allAccounts = JSON.parse(c);
      filtered = allAccounts.filter(a=>a.status==='pending');
      renderList();
      document.getElementById('lcount').textContent = filtered.length+' (cached)';
      showBar('Showing cached data — tap 🔄 to refresh','offline');
    } else {
      el.innerHTML = `<div class="empty"><div style="font-size:44px;margin-bottom:10px">📡</div>
        <div style="margin-bottom:16px">Could not connect.<br>Check internet and try again.</div>
        <button class="btn btnp" onclick="loadAll(true)" style="width:auto;padding:10px 24px;margin:0 auto;">Try again</button></div>`;
    }
  }
}

async function bgRefresh() {
  try {
    const areaParam = selectedArea!=='all'?'&area='+encodeURIComponent(selectedArea):'';
    const res = await fetch(API+'?action=all'+areaParam);
    const data = await res.json();
    if (data.accounts) {
      allAccounts = data.accounts;
      localStorage.setItem(CK, JSON.stringify(allAccounts));
      localStorage.setItem(CT, Date.now()+'');
    }
  } catch(e) {}
}

function renderList() {
  const el = document.getElementById('alist');
  const slice = filtered.slice(0, page*pageSize);
  if (!filtered.length) {
    el.innerHTML='<div class="empty"><div style="font-size:44px;margin-bottom:10px">🎉</div><div>All accounts have readings!</div></div>';
    document.getElementById('lmbtn').style.display='none';
    return;
  }
  el.innerHTML = slice.map(a => {
    const isUpdated = updatedSet.has(String(a.acno));
    const cls = isUpdated ? 'updated' : '';
    const tag = isUpdated ? '<span class="utag">✓ Updated</span>' : '';
    return `<div class="acard ${cls}" onclick="openAccount('${a.acno}')">
      <div class="ainfo">
        <div class="aacno">ACNO ${a.acno}${tag}</div>
        <div class="ameter">Meter: ${a.meter||'—'}</div>
        <div class="aaddr">${a.address||'—'}</div>
        <div class="ardate">R_DATE: ${a.rdate||'—'}</div>
      </div>
      <span class="arr">›</span>
    </div>`;
  }).join('');
  document.getElementById('lmbtn').style.display = slice.length<filtered.length?'block':'none';
}

function loadMore() { page++; renderList(); }

function filterList(val) {
  page=1;
  if (!val) {
    filtered = allAccounts.filter(a=>a.status==='pending');
    document.getElementById('ltitle').textContent='Unbilled Accounts';
    document.getElementById('lcount').textContent=filtered.length+' pending';
  } else {
    filtered = allAccounts.filter(a=>
      String(a.acno).includes(val)||
      String(a.meter||'').includes(val)||
      (a.address||'').toLowerCase().includes(val.toLowerCase())
    );
    document.getElementById('ltitle').textContent='Search Results';
    document.getElementById('lcount').textContent=filtered.length+' found';
  }
  renderList();
}

function quickSearch() {
  const val = document.getElementById('sinput').value.trim();
  if (!val) return;
  const a = allAccounts.find(x=>String(x.acno)===val);
  if (a) { fillDetail(a); currentAcct=a; show('detail'); return; }
  filterList(val);
}

async function openAccount(acno) {
  const a = allAccounts.find(x=>String(x.acno)===String(acno));
  if (a) { currentAcct=a; fillDetail(a); show('detail'); return; }
  showBar('Loading...','syncing');
  try {
    const res = await fetch(API+'?action=search&acno='+encodeURIComponent(acno));
    const data = await res.json();
    document.getElementById('sbar').className='sbar';
    if (data.found) { currentAcct=data; fillDetail(data); show('detail'); }
  } catch(e) { showBar('Could not load account','offline'); }
}

function fillDetail(d) {
  document.getElementById('d-acno').textContent=d.acno;
  document.getElementById('d-area').textContent='Area '+d.area||'—';
  document.getElementById('d-meter').textContent=d.meter||'—';
  document.getElementById('d-addr').textContent=d.address||'—';
  document.getElementById('d-prev').textContent=d.prevReading||'—';
  document.getElementById('d-pdate').textContent=d.prevDate||'—';
  document.getElementById('d-rdate').textContent=d.rdate||'—';
  const b=document.getElementById('d-status');
  b.textContent=d.status==='done'?'Done':'Pending';
  b.className='badge '+(d.status==='done'?'bd':'bp');
  document.getElementById('f-reading').value='';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-remarks').value=d.remarks||'';
  document.getElementById('serr').style.display='none';
  clearPhoto();
}

async function saveReading() {
  const reading=document.getElementById('f-reading').value.trim();
  const date=document.getElementById('f-date').value;
  const remarks=document.getElementById('f-remarks').value.trim();
  const err=document.getElementById('serr');
  const btn=document.getElementById('savebtn');
  err.style.display='none';
  if (!reading&&!remarks){err.textContent='Please enter a reading or remarks.';err.style.display='block';return;}
  const update={
    action:'update',acno:currentAcct.acno,row:currentAcct.row,
    newReading:reading,newDate:date,remarks:remarks,
    worker:document.getElementById('wlabel').textContent,
    savedAt:new Date().toLocaleString(),synced:false
  };
  pending.push(update);
  localStorage.setItem('ub_pending',JSON.stringify(pending));
  updatedSet.add(String(update.acno));
  updateDot();
  const ci=allAccounts.findIndex(a=>String(a.acno)===String(update.acno));
  if (ci>=0){allAccounts[ci].status='done';allAccounts[ci].newDate=date;}
  localStorage.setItem(CK,JSON.stringify(allAccounts));
  btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  let msg='ACNO '+update.acno+' saved offline, will sync later.';
  if (navigator.onLine) {
    try {
      const res=await fetch(API,{method:'POST',body:JSON.stringify(update)});
      const data=await res.json();
      if (data.success) {
        pending[pending.length-1].synced=true;
        localStorage.setItem('ub_pending',JSON.stringify(pending));
        msg='ACNO '+update.acno+' synced to Google Sheets ✓';
        // Upload photo if present
        if (photoB64) {
          try {
            const pres = await fetch(API, {method:'POST', body:JSON.stringify({
              action:'upload_photo', acno:update.acno,
              date:update.newDate, photo:photoB64,
              worker:update.worker
            })});
            const pdata = await pres.json();
            if (pdata.success) msg += ' + Photo uploaded ✓';
          } catch(pe) { msg += ' (Photo upload failed)'; }
          photoB64=null;
        }
      }
    } catch(e) {}
  } else showBar('Offline — saved locally','offline');
  btn.innerHTML='💾 Save Reading';btn.disabled=false;
  document.getElementById('smsg').textContent=msg;
  renderList();
  show('success');
}

async function syncAll() {
  const unsynced=pending.filter(p=>!p.synced);
  if (!unsynced.length){showBar('All synced ✓','ok');return;}
  if (!navigator.onLine){showBar('No internet','offline');return;}
  const btn=document.getElementById('syncbtn');
  btn.innerHTML='<span class="spin"></span> Syncing...';btn.disabled=true;
  showBar('Syncing '+unsynced.length+' updates...','syncing');
  let done=0;
  for (const u of unsynced) {
    try {
      const r=await fetch(API,{method:'POST',body:JSON.stringify(u)});
      const d=await r.json();
      if(d.success){const i=pending.findIndex(p=>p.acno===u.acno&&p.savedAt===u.savedAt);if(i>=0)pending[i].synced=true;done++;}
    } catch(e){break;}
  }
  localStorage.setItem('ub_pending',JSON.stringify(pending));
  updateDot();renderPending();
  btn.innerHTML='🔄 Sync all now';btn.disabled=false;
  showBar('Synced '+done+' of '+unsynced.length+' ✓','ok');
}

function renderPending() {
  const list=document.getElementById('plist');
  const empty=document.getElementById('pempty');
  document.getElementById('sp').textContent=pending.filter(p=>!p.synced).length;
  document.getElementById('ss').textContent=pending.filter(p=>p.synced).length;
  if (!pending.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=pending.slice().reverse().map(p=>`
    <div class="acard ${p.synced?'updated':''}">
      <div class="ainfo">
        <div class="aacno">ACNO ${p.acno}${p.synced?'<span class="utag">✓ Synced</span>':''}</div>
        <div class="ardate">${p.newReading?'Reading: '+p.newReading+' · ':''}${p.savedAt}</div>
      </div>
      <span class="badge ${p.synced?'bd':'bp'}">${p.synced?'Synced':'Pending'}</span>
    </div>`).join('');
}

function updateDot(){document.getElementById('ndot').style.display=pending.some(p=>!p.synced)?'block':'none';}

function previewPhoto(input) {
  const file=input.files[0];if(!file)return;
  // Compress image before upload
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const maxW=1024, maxH=1024;
      let w=img.width, h=img.height;
      if (w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if (h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.7);
      photoB64=compressed.split(',')[1];
      document.getElementById('pimg').src=compressed;
      document.getElementById('pp').style.display='block';
      document.getElementById('pbw').style.display='none';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearPhoto(){
  photoB64=null;
  const i=document.getElementById('pinput');if(i)i.value='';
  const pp=document.getElementById('pp');if(pp)pp.style.display='none';
  const pb=document.getElementById('pbw');if(pb)pb.style.display='block';
}

function changeName(){
  const n=prompt('Your name:',document.getElementById('wlabel').textContent);
  if(n){localStorage.setItem('wname',n);document.getElementById('wlabel').textContent=n;}
}

window.addEventListener('online',()=>{showBar('Back online — syncing...','syncing');syncAll();});
window.addEventListener('offline',()=>showBar('Offline — updates saved locally','offline'));
if(!navigator.onLine)showBar('Offline — updates saved locally','offline');

const wn=localStorage.getItem('wname');
if(wn)document.getElementById('wlabel').textContent=wn;
else{const n=prompt('Enter your name:')||'Field Worker';localStorage.setItem('wname',n);document.getElementById('wlabel').textContent=n;}

// Set area chip
document.getElementById('area-chip').textContent = selectedArea==='all'?'Area: All':'Area: '+selectedArea;
updateDot();

// Start: load areas first, then if area already selected go to home
const cachedAccounts = localStorage.getItem(CK);
if (cachedAccounts && selectedArea) {
  allAccounts = JSON.parse(cachedAccounts);
  filtered = allAccounts.filter(a=>a.status==='pending');
  renderList();
  document.getElementById('lcount').textContent = filtered.length+' pending';
  show('home'); switchNav('home');
  bgRefresh();
} else {
  loadAreas();
}
</script>

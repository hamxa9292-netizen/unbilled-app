<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F4E79">
<title>Unbilled Readings</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;overscroll-behavior-y:none;}
html{overscroll-behavior-y:none;}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.content{flex:1;overflow-y:auto;overscroll-behavior-y:none;padding-bottom:72px;}
.hdr{background:#1F4E79;color:#fff;padding:13px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;}
.hdr h1{font-size:16px;font-weight:600;flex:1;}
.hdr-name{font-size:12px;opacity:.8;cursor:pointer;}
.hdr-rf{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:5px 10px;font-size:14px;cursor:pointer;margin-left:4px;}
.sbar{font-size:12px;padding:6px 16px;align-items:center;gap:6px;display:none;}
.sbar.show{display:flex;}
.sbar.offline{background:#92400e;color:#fef3c7;}
.sbar.syncing{background:#1e40af;color:#dbeafe;}
.sbar.ok{background:#14532d;color:#dcfce7;}
.screen{display:none;}
.screen.active{display:block;}

/* Area selector screen */
.area-screen{padding:20px 16px;}
.area-title{font-size:18px;font-weight:700;color:#1F4E79;margin-bottom:6px;}
.area-sub{font-size:14px;color:#6b7280;margin-bottom:20px;}
.area-load{background:#1E7145;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;width:100%;cursor:pointer;font-family:inherit;}

/* Search + list */
.topbar{background:#1F4E79;padding:0 12px 12px;position:sticky;top:46px;z-index:99;}
.area-chip{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-top:10px;}
.achip{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
.achange{background:none;border:none;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;}
.sw{position:relative;}
.sw input{width:100%;padding:11px 70px 11px 42px;font-size:15px;border:none;border-radius:10px;background:#fff;font-family:inherit;outline:none;color:#111;}
.sw .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;color:#9ca3af;}
.sw .go{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#1F4E79;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;}
.lhdr{padding:10px 16px 6px;display:flex;justify-content:space-between;}
.lhdr-t{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;}
.lhdr-c{font-size:12px;color:#9ca3af;}
.acard{background:#fff;margin:0 12px 8px;border-radius:12px;padding:13px 14px;box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:pointer;border-left:4px solid #f59e0b;display:flex;align-items:center;gap:10px;}
.acard:active{opacity:.85;}
.acard.updated{background:#f0fdf4;border-left-color:#16a34a;}
.ainfo{flex:1;min-width:0;}
.aacno{font-size:15px;font-weight:700;color:#1F4E79;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.utag{font-size:10px;font-weight:700;color:#16a34a;background:#dcfce7;padding:2px 7px;border-radius:10px;}
.ameter{font-size:12px;color:#374151;font-weight:500;margin-top:2px;}
.aaddr{font-size:12px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.ardate{font-size:11px;color:#9ca3af;margin-top:2px;}
.arr{font-size:18px;color:#d1d5db;flex-shrink:0;}
.badge{display:inline-flex;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.bp{background:#fef3c7;color:#92400e;}
.bd{background:#d1fae5;color:#065f46;}
.errmsg{background:#fee2e2;color:#b91c1c;padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:10px;display:none;}
.rmphoto{margin-top:6px;background:#fee2e2;color:#b91c1c;border:none;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;font-family:inherit;}
.swrap{text-align:center;padding:48px 20px;}
.sico{font-size:60px;margin-bottom:14px;}
.stitle{font-size:20px;font-weight:700;color:#111;margin-bottom:6px;}
.ssub{font-size:14px;color:#6b7280;margin-bottom:26px;}
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-bottom:8px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{opacity:.82;}
.btnp{background:#1F4E79;color:#fff;}
.btns{background:#1E7145;color:#fff;}
.btng{background:#f3f4f6;color:#374151;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 10px;}
.stat{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.statn{font-size:24px;font-weight:800;color:#1F4E79;}
.statl{font-size:11px;color:#6b7280;margin-top:2px;}
.nav{display:flex;background:#fff;border-top:1px solid #e5e7eb;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;}
.nbtn{flex:1;padding:9px 4px 11px;text-align:center;font-size:11px;font-weight:500;color:#9ca3af;cursor:pointer;border:none;background:none;font-family:inherit;position:relative;}
.nbtn.active{color:#1F4E79;}
.nico{font-size:21px;display:block;margin-bottom:1px;}
.ndot{width:8px;height:8px;background:#ef4444;border-radius:50%;display:none;position:absolute;top:7px;right:calc(50% - 18px);}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg);}}
.loading{text-align:center;padding:40px 20px;color:#9ca3af;font-size:14px;line-height:1.8;}
.loadmore{margin:4px 12px 14px;padding:11px;background:#fff;border:1.5px dashed #d1d5db;border-radius:10px;color:#6b7280;font-size:14px;text-align:center;cursor:pointer;font-family:inherit;width:calc(100% - 24px);}
.empty{text-align:center;padding:48px 20px;color:#9ca3af;}
.plist{padding:0 12px;}

/* ── DETAIL SCREEN — compact, no wasted space ── */
#screen-detail {
  display: none;
  flex-direction: column;
  background: #111827;
  min-height: 100vh;
}
#screen-detail.active {
  display: flex;
}

/* Compact sticky header */
#detail-hdr {
  background: #1F4E79;
  padding: 8px 12px;
  border-bottom: 2px solid #fbbf24;
  flex-shrink: 0;
}

/* Body: only as tall as its content, no flex-grow */
#detail-body {
  padding: 10px 12px 8px;
  flex-shrink: 0;
}

/* Fixed bottom action buttons — repositioned via JS to sit above keyboard */
#detail-btns {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 430px;
  margin: 0 auto;
  padding: 8px 12px 12px;
  background: #0f172a;
  border-top: 2px solid #1e293b;
  z-index: 999;
}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <span style="font-size:21px">⚡</span>
  <h1>Unbilled Readings</h1>
  <span class="hdr-name" onclick="changeName()">👤 <span id="wlabel">Field Worker</span></span>
  <button class="hdr-rf" id="rfbtn" onclick="hardRefresh()">🔄</button>
</div>
<div class="sbar" id="sbar"></div>

<div class="content">

  <!-- AREA SELECTION SCREEN -->
  <div class="screen active" id="screen-area">
    <div class="area-screen">
      <div class="area-title">Select Area</div>
      <div class="area-sub">Choose an area to load its accounts</div>
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px;">Area</label>
        <select id="area-select" style="width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:16px;background:#fff;color:#111;font-family:inherit;outline:none;">
          <option value="all">All Areas</option>
        </select>
      </div>
      <button class="area-load" id="area-load-btn" onclick="loadSelectedArea()">Load Accounts →</button>
      <div id="area-err" style="color:#b91c1c;font-size:13px;margin-top:10px;display:none;text-align:center;"></div>
    </div>
  </div>

  <!-- HOME (account list) -->
  <div class="screen" id="screen-home">
    <div class="topbar">
      <div class="area-chip">
        <span class="achip" id="area-chip">Area: All</span>
        <button class="achange" onclick="showAreaScreen()">Change area</button>
      </div>
      <div class="sw">
        <span class="ico">🔍</span>
        <input type="number" id="sinput" placeholder="Search account / meter no..." inputmode="numeric" autocomplete="off"
          oninput="filterList(this.value)" onkeydown="if(event.key==='Enter')quickSearch()">
        <button class="go" onclick="quickSearch()">Go</button>
      </div>
    </div>
    <div class="lhdr">
      <span class="lhdr-t" id="ltitle">Unbilled Accounts</span>
      <span class="lhdr-c" id="lcount"></span>
    </div>
    <div id="alist"></div>
    <button class="loadmore" id="lmbtn" onclick="loadMore()" style="display:none">Load more ↓</button>
  </div>

  <!-- DETAIL SCREEN — compact layout -->
  <div class="screen" id="screen-detail">

    <!-- Compact sticky header -->
    <div id="detail-hdr">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
        <button onclick="goBack()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;">✕ List</button>
        <span class="badge" id="d-status"></span>
      </div>
      <div style="color:#7dd3fc;font-size:13px;font-weight:700;line-height:1.2;" id="d-addr"></div>
      <div style="color:#fff;font-size:12px;margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;">
        <span><span style="opacity:.7;">AC: </span><span style="font-weight:800;" id="d-acno"></span></span>
        <span style="opacity:.4;">|</span>
        <span><span style="opacity:.7;">Area: </span><span style="font-weight:700;" id="d-area"></span></span>
        <span style="opacity:.4;">|</span>
        <span><span style="opacity:.7;">Meter: </span><span style="font-weight:700;color:#7dd3fc;" id="d-meter"></span></span>
      </div>
      <div style="color:#fbbf24;font-size:12px;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <span style="font-weight:700;" id="d-prev"></span>
        <span style="opacity:.6;"> on </span>
        <span id="d-pdate"></span>
        <span style="opacity:.4;margin:0 2px;">|</span>
        <span style="color:#fff;opacity:.8;">R_DATE: </span>
        <span style="color:#fff;font-weight:700;" id="d-rdate"></span>
        <span style="opacity:.4;margin:0 2px;">|</span>
        <!-- Photo inline -->
        <span id="pbw" style="display:inline-flex;align-items:center;">
          <button onclick="document.getElementById('pinput').click()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit;">📷</button>
          <input type="file" id="pinput" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)">
        </span>
        <span id="pp" style="display:none;align-items:center;gap:4px;">
          <img id="pimg" src="" style="border-radius:4px;height:20px;width:28px;object-fit:cover;vertical-align:middle;">
          <button onclick="clearPhoto()" style="background:rgba(239,68,68,.3);border:none;color:#fca5a5;border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;font-family:inherit;">✕</button>
        </span>
      </div>
    </div>

    <!-- Reading input area — compact, no scrolling needed -->
    <div id="detail-body">
      <div style="color:#6b7280;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">New Reading</div>
      <input type="number" id="f-reading" placeholder="0" inputmode="numeric" autocomplete="off"
        style="width:100%;background:#fff;border:3px solid #2563eb;border-radius:10px;font-size:32px;font-weight:800;padding:12px 16px;color:#111;font-family:inherit;outline:none;text-align:center;margin-bottom:10px;">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
        <div>
          <div style="color:#6b7280;font-size:11px;margin-bottom:3px;">New Date</div>
          <input type="date" id="f-date" style="width:100%;padding:9px;border:1.5px solid #374151;border-radius:8px;font-size:13px;background:#1f2937;color:#fff;font-family:inherit;outline:none;">
        </div>
        <div>
          <div style="color:#6b7280;font-size:11px;margin-bottom:3px;">Remarks</div>
          <input type="text" id="f-remarks" placeholder="Done / Locked..." style="width:100%;padding:9px;border:1.5px solid #374151;border-radius:8px;font-size:13px;background:#1f2937;color:#fff;font-family:inherit;outline:none;">
        </div>
      </div>

      <div class="errmsg" id="serr" style="margin-top:6px;"></div>

      <!-- Spacer so content doesn't hide behind fixed buttons -->
      <div style="height:72px;"></div>
    </div>

    <!-- Fixed bottom action buttons -->
    <div id="detail-btns">
      <div style="display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:8px;">
        <button onclick="goPrev()" style="background:#374151;color:#fff;border:none;border-radius:10px;padding:16px 0;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">◀ Prev</button>
        <button onclick="saveReading(false)" style="background:#1E7145;color:#fff;border:none;border-radius:10px;padding:16px 0;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;">Save</button>
        <button onclick="saveReading(true)" style="background:#1d4ed8;color:#fff;border:none;border-radius:10px;padding:16px 0;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">Next ▶</button>
      </div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div class="screen" id="screen-success">
    <div class="swrap">
      <div class="sico">✅</div>
      <div class="stitle">Reading saved!</div>
      <div class="ssub" id="smsg"></div>
      <button class="btn btnp" onclick="goBack()" style="margin-bottom:10px">← Back to list</button>
      <button class="btn btng" onclick="switchNav('pending')">View pending</button>
    </div>
  </div>

  <!-- PENDING -->
  <div class="screen" id="screen-pending">
    <div class="stats">
      <div class="stat"><div class="statn" id="sp">0</div><div class="statl">Pending sync</div></div>
      <div class="stat"><div class="statn" id="ss">0</div><div class="statl">Synced</div></div>
    </div>
    <div style="padding:0 14px 12px"><button class="btn btnp" onclick="syncAll()" id="syncbtn">🔄 Sync all now</button></div>
    <div class="lhdr"><span class="lhdr-t">Saved updates</span></div>
    <div class="plist" id="plist"></div>
    <div class="empty" id="pempty" style="display:none"><div style="font-size:44px;margin-bottom:10px">✅</div><div>All synced!</div></div>
  </div>

</div>

<nav class="nav">
  <button class="nbtn active" id="nav-home" onclick="switchNav('home')">
    <span class="nico">🏠</span>Home
  </button>
  <button class="nbtn" id="nav-pending" onclick="switchNav('pending')">
    <span class="nico">🕐</span>Pending
    <span class="ndot" id="ndot"></span>
  </button>
</nav>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxRqL8C6-0B8Ft3wt6LJY636Z74EWeSAby0k5tExIMyaLD3HcdkJFB_oJ6C8-KUmEM-/exec";
const CK = 'ub_cache', CT = 'ub_ts', TTL = 30*60*1000;

// On startup: wipe ALL locally pending entries — sheet is the single source of truth.
// Any unsynced entries would need to be re-entered; synced ones the sheet already has.
// This prevents stale "✓ Updated" tags from old sessions polluting the view.
localStorage.removeItem('ub_pending');
let pending = [];

let allAccounts = [], filtered = [], page = 1, pageSize = 40;
let currentAcct = null, photoB64 = null;
let selectedArea = localStorage.getItem('ub_area') || 'all';
// updatedSet starts empty — populated only after sheet confirms sync this session
let updatedSet = new Set();

function showBar(msg, type) {
  const b = document.getElementById('sbar');
  b.className = 'sbar show ' + type;
  b.textContent = msg;
  if (type==='ok') setTimeout(()=>b.className='sbar',3000);
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
    s.style.display = '';
  });
  const el = document.getElementById('screen-'+id);
  el.classList.add('active');

  // Hide bottom nav when in detail screen, show otherwise
  const nav = document.querySelector('.nav');
  if (id === 'detail') {
    nav.style.display = 'none';
    document.querySelector('.content').style.paddingBottom = '0';
    setTimeout(updateBtnPosition, 50);
  } else {
    nav.style.display = 'flex';
    document.querySelector('.content').style.paddingBottom = '72px';
  }
}

function switchNav(tab) {
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nav-'+tab);
  if (nb) nb.classList.add('active');
  if (tab==='pending') { renderPending(); show('pending'); }
  else if (tab==='home') show('home');
}

function goBack() { clearPhoto(); show('home'); switchNav('home'); }

function goPrev() {
  const currentIdx = filtered.findIndex(a=>String(a.acno)===String(currentAcct.acno));
  if (currentIdx > 0) {
    const prev = filtered[currentIdx - 1];
    currentAcct = prev;
    fillDetail(prev);
    const prevUpdate = pending.slice().reverse().find(p=>String(p.acno)===String(prev.acno));
    if (prevUpdate) {
      document.getElementById('f-reading').value = prevUpdate.newReading || '';
      document.getElementById('f-date').value = prevUpdate.newDate || new Date().toISOString().split('T')[0];
      document.getElementById('f-remarks').value = prevUpdate.remarks || '';
    }
    setTimeout(()=>{ document.getElementById('f-reading').focus(); }, 300);
  } else {
    showBar('Already at first account','offline');
  }
}

function showAreaScreen() { show('area'); }

let selectedAreaTemp = selectedArea;

function loadAreas() {
  const sel = document.getElementById('area-select');
  sel.innerHTML = '<option value="all">All Areas</option>';
  for (let i = 1; i <= 24; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = 'Area ' + i;
    if (String(i) === String(selectedArea)) opt.selected = true;
    sel.appendChild(opt);
  }
  if (selectedArea === 'all') sel.value = 'all';
}

async function loadSelectedArea() {
  selectedArea = document.getElementById('area-select').value;
  localStorage.setItem('ub_area', selectedArea);
  const btn = document.getElementById('area-load-btn');
  btn.innerHTML = '<span class="spin"></span> Loading...';
  btn.disabled = true;
  localStorage.removeItem(CK); localStorage.removeItem(CT);
  await loadAll(true);
  btn.innerHTML = 'Load Accounts →';
  btn.disabled = false;
  document.getElementById('area-chip').textContent = selectedArea==='all' ? 'Area: All' : 'Area: '+selectedArea;
  show('home');
  switchNav('home');
}

async function hardRefresh() {
  const btn = document.getElementById('rfbtn');
  btn.textContent = '⏳'; btn.disabled = true;
  localStorage.removeItem(CK); localStorage.removeItem(CT);
  localStorage.removeItem('ub_pending');
  pending = []; updatedSet = new Set();
  updateDot();
  await loadAll(true);
  btn.textContent = '🔄'; btn.disabled = false;
  showBar('Refreshed ✓','ok');
}

async function loadAll(force) {
  const el = document.getElementById('alist');
  if (!force) {
    const c = localStorage.getItem(CK), ts = parseInt(localStorage.getItem(CT)||'0');
    if (c && (Date.now()-ts)<TTL) {
      allAccounts = JSON.parse(c);
      filtered = allAccounts.filter(a=>a.status==='pending');
      renderList();
    flex-shrink: 0;
}

/* Fixed bottom action buttons — repositioned via JS to sit above keyboard */
#detail-btns {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 430px;
  margin: 0 auto;
  padding: 8px 12px 12px;
  background: #0f172a;
  border-top: 2px solid #1e293b;
  z-index: 999;
}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <span style="font-size:21px">⚡</span>
  <h1>Unbilled Readings</h1>
  <span class="hdr-name" onclick="changeName()">👤 <span id="wlabel">Field Worker</span></span>
  <button class="hdr-rf" id="rfbtn" onclick="hardRefresh()">🔄</button>
</div>
<div class="sbar" id="sbar"></div>

<div class="content">

  <!-- AREA SELECTION SCREEN -->
  <div class="screen active" id="screen-area">
    <div class="area-screen">
      <div class="area-title">Select Area</div>
      <div class="area-sub">Choose an area to load its accounts</div>
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px;">Area</label>
        <select id="area-select" style="width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:16px;background:#fff;color:#111;font-family:inherit;outline:none;">
          <option value="all">All Areas</option>
        </select>
      </div>
      <button class="area-load" id="area-load-btn" onclick="loadSelectedArea()">Load Accounts →</button>
      <div id="area-err" style="color:#b91c1c;font-size:13px;margin-top:10px;display:none;text-align:center;"></div>
    </div>
  </div>

  <!-- HOME (account list) -->
  <div class="screen" id="screen-home">
    <div class="topbar">

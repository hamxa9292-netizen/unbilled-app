<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
    .screen { display: none; padding: 20px; }
    #screen-pending { display: block; } /* Default screen */
    
    /* Stats Styling */
    .stats { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat { background: #fff; padding: 15px; border-radius: 8px; flex: 1; text-align: center; }
    .statn { font-size: 24px; font-weight: bold; }
    .statl { font-size: 12px; color: #666; }
    
    .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btnp { background: #007bff; color: white; }
    
    #navbar { position: fixed; bottom: 0; width: 100%; display: flex; background: #fff; border-top: 1px solid #ddd; }
    .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; }
  </style>
</head>
<body>

  <!-- PENDING SCREEN -->
  <div class="screen" id="screen-pending">
    <h2>Dashboard</h2>
    <div class="stats">
      <div class="stat"><div class="statn" id="sp">0</div><div class="statl">Pending</div></div>
      <div class="stat"><div class="statn" id="ss">0</div><div class="statl">Synced</div></div>
    </div>
    
    <!-- Dashboard Stats Container -->
    <div id="area-stats-container"></div>
    
    <div style="margin-top:20px">
      <button class="btn btnp" onclick="syncAll()" id="syncbtn">🔄 Sync all now</button>
    </div>
  </div>

  <!-- SETTINGS SCREEN -->
  <div class="screen" id="screen-settings">
    <h2>Settings</h2>
    <p>Configuration options go here.</p>
  </div>

  <!-- NAVIGATION -->
  <div id="navbar">
    <div class="nav-item" onclick="show('pending')">Pending</div>
    <div class="nav-item" onclick="show('settings')">Settings</div>
  </div>

  <script>
    const API = "YOUR_WEB_APP_URL"; // Replace with your deployment URL

    // Navigation logic with trigger for stats update
    function show(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
      const target = document.getElementById('screen-' + screenId);
      if (target) {
        target.style.display = 'block';
      }

      // Automatically refresh stats when navigating to the Pending screen
      if (screenId === 'pending') {
        fetchDashboardStats(); 
      }
    }

    // Dashboard Stats logic
    async function fetchDashboardStats() {
      const token = localStorage.getItem('token'); // Assuming you store your token here
      if (!token) return;

      try {
        const res = await fetch(API, {
          method: 'POST',
          body: JSON.stringify({ action: 'dashboard_stats', token: token })
        });
        const data = await res.json();
        
        if (data.success && data.areas) {
          renderAreaStats(data.areas);
        }
      } catch (e) {
        console.error("Stats load error:", e);
      }
    }

    function renderAreaStats(areas) {
      const container = document.getElementById('area-stats-container');
      if (!container) return;

      container.innerHTML = areas.map(a => `
        <div style="background:#fff; padding:10px; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between; border: 1px solid #eee;">
          <span><strong>${a.area}</strong></span>
          <span>✅ ${a.done} | ⏳ ${a.pending}</span>
        </div>
      `).join('');
    }

    // Existing syncAll placeholder
    function syncAll() {
      alert("Syncing triggered...");
    }
    
    // Initial fetch
    fetchDashboardStats();
  </script>
</body>
</html>
